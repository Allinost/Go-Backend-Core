# golangci-lint 配置
# 安装: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
# 运行: golangci-lint run

run:
  timeout: 3m
  go: "1.26"
  issues-exit-code: 1
  tests: true
  modules-download-mode: readonly

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
    - errcheck       # 检查未处理的 error 返回值
    - gosimple       # 简化代码
    - govet          # Go 官方 vet
    - ineffassign    # 检查未使用的赋值
    - staticcheck    # 静态分析
    - unused         # 检测未使用的标识符
    - bodyclose      # 检查 HTTP 响应体是否关闭
    - gocritic       # 代码风格审查
    - gofmt          # 检查 gofmt 格式
    - goimports      # 检查 import 排序
    - misspell       # 拼写检查
    - nilerr         # 检查返回 nil 的 error
    - prealloc       # 预分配切片提示
    - whitespace     # 检查多余空白字符
  disable:
    - funlen         # 限制函数长度（对脚手架项目过于严格）
    - lll            # 限制行长度
  fast: false

linters-settings:
  errcheck:
    check-blank: false
    check-type-assertions: true
  gofmt:
    simplify: true
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam
      - rangeValCopy
  misspell:
    locale: US
  govet:
    check-shadowing: false
  staticcheck:
    checks:
      - all
      - -SA1019    # 允许使用已弃用标识符（过渡期）

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosimple
    - path: cmd/
      linters:
        - gocritic
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
