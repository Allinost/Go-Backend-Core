# Go-Backend-Core 全局配置文件
# 优先级：Docker Secret > 环境变量(APP_*) > 此文件 > 内置默认值

server:
  name: go-backend-core        # 服务名称，用于日志/监控标识
  version: v0.1.0              # 当前版本号
  port: 29090                  # HTTP 监听端口
  mode: debug                  # Gin 运行模式：debug | release | test

log:
  level: info                  # 日志级别：debug | info | warn | error | fatal
  format: json                 # 日志输出格式：json | text
  output: stdout               # 日志输出目标：stdout | file | rotate
  log_dir: logs                # 日志目录（rotate/file 模式）
  max_size_mb: 100             # 单文件最大 MB，超限自动切分
  max_age_days: 30             # 日志保留天数

database:
  mysql:
    main:                      # 主数据库实例标识
      enabled: true            # 是否启用 MySQL
      host: localhost          # MySQL 主机地址
      port: 3306               # MySQL 监听端口
      user: root               # 数据库用户名（通过 .env 中 APP_DATABASE_MYSQL_MAIN_* 覆盖）
      password: ""             # ⚠️ 密码通过 .env 或 Docker Secret 注入，此处留空
      dbname: go_backend_core  # 数据库名称
      max_open: 50             # 最大打开连接数
      max_idle: 10             # 最大空闲连接数
      conn_max_lifetime: 30m   # 连接最大存活时间

  postgres:
    nas:                       # NAS 上的 PostgreSQL 实例（仅 NAS 场景使用）
      enabled: true            # 是否启用 PostgreSQL
      host: localhost
      port: 5432
      user: postgres
      password: ""             # ⚠️ 密码通过 .env 注入
      dbname: go_backend_core
      max_open: 20
      max_idle: 5
      conn_max_lifetime: 30m

  s3:
    minio:                     # MinIO 对象存储
      enabled: false         # 是否启用 MinIO（默认关闭）
      endpoint: "minio:9000"
      access_key: ""
      secret_key: ""
      use_ssl: false
      bucket: "app-data"
      region: "us-east-1"
    rustfs:                    # RustFS 自建对象存储
      enabled: true         # 是否启用 RustFS
      endpoint: "rustfs.example.com"
      access_key: ""
      secret_key: ""
      use_ssl: true
      bucket: "app-files"
      region: "us-east-1"

redis:
    main:                        # 主 Redis 实例标识
    enabled: true              # 是否启用 Redis
    addr: localhost:6379       # Redis 地址
    password: ""               # Redis 密码（生产环境务必设置）
    db: 0                      # Redis 数据库编号
    pool_size: 50              # 连接池大小

cache:
  default_ttl: 5m                       # 默认缓存 TTL
  default_nil_ttl: 30s                  # 空值缓存 TTL（防穿透）
  jitter: 10s                           # TTL 随机抖动范围（防雪崩）
  l1_max_size: 10000                    # L1 内存缓存最大条目数
  redis_key: main                       # 使用的 Redis 实例名称

auth:
  jwt_secret: ""                        # ⚠️ JWT 签名密钥通过 .env 中 APP_AUTH_JWT_SECRET 注入
  jwt_expire: 24h                       # JWT 令牌有效期（如 72h/7d/30d）

scheduler:
  enabled: true                # 是否启用调度器
  worker_concurrency: 5        # 同时执行任务数
  default_timeout: 300         # 默认超时秒数
  default_max_retries: 3       # 默认重试次数
  log_retention_days: 90       # 执行日志保留天数

config:
  watch: true                  # 是否启用配置文件热加载
  watch_interval: 5s           # 文件变更监听轮询间隔
