services:
  app:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "29090:29090"   # 业务 API（Nginx 对外暴露）
      - "29092:29092"   # 调试/监控/运维（仅内网）
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
