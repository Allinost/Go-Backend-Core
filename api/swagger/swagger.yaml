      TaskStatusFinished: 已完成
      TaskStatusPaused: 已暂停
    x-enum-descriptions:
    - 活跃状态
    - 已暂停
    - 已完成
    x-enum-varnames:
    - TaskStatusActive
    - TaskStatusPaused
    - TaskStatusFinished
  internal_services_scheduler.TaskType:
    enum:
    - cron
    - once
    - interval
    type: string
    x-enum-comments:
      TaskTypeCron: cron 表达式定时任务
      TaskTypeInterval: 固定间隔执行任务
      TaskTypeOnce: 一次性执行任务
    x-enum-descriptions:
    - cron 表达式定时任务
    - 一次性执行任务
    - 固定间隔执行任务
    x-enum-varnames:
    - TaskTypeCron
    - TaskTypeOnce
    - TaskTypeInterval
schemes:
  - http
  - https
host: 192.168.1.36:29090
info:
  contact:
    name: Allinost
    url: https://github.com/Allinost/go-backend-core
  description: 模块化 Go 后端服务 API 文档
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/Allinost/go-backend-core
  title: Go Backend Core API
  version: 0.1.0
paths:
  /auth/{provider}/bind:
    post:
      consumes:
      - application/json
      description: 将当前登录用户与第三方社交账号绑定
      parameters:
      - description: '平台名称: wechat/feishu/qq/apple/huawei/honor'
        in: path
        name: provider
        required: true
        type: string
      - description: 授权码
        in: body
        name: body
        required: true
        schema:
          properties:
            code:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 绑定第三方社交账号
      tags:
      - auth-社交登录
  /auth/{provider}/callback:
    post:
      description: 第三方登录授权回调处理，自动注册或登录
      parameters:
      - description: 平台名称
        in: path
        name: provider
        required: true
        type: string
      - description: 授权码
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_services_auth.TokenPair'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
      summary: OAuth 登录回调
      tags:
      - auth-社交登录
  /auth/{provider}/unbind:
    post:
      description: 当前登录用户解绑已绑定的第三方社交账号
      parameters:
      - description: 平台名称
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 解绑社交账号
      tags:
      - auth-社交登录
  /auth/{provider}/url:
    get:
      description: 获取指定第三方登录平台的授权跳转 URL
      parameters:
      - description: '平台名称: wechat/feishu/qq/apple/huawei/honor'
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
            - properties:
                data:
                  properties:
                    auth_url:
                      type: string
                    provider:
                      type: string
                    state:
                      type: string
                  type: object
              type: object
      summary: 获取 OAuth 授权 URL
      tags:
      - auth-社交登录
  /auth/accounts:
    get:
      description: 返回当前用户已绑定的全部第三方社交账号
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 获取绑定的社交账号列表
      tags:
      - auth-社交登录
  /auth/api-keys:
    get:
      description: 获取当前用户的所有 API 密钥（管理员可查看全部）
      parameters:
      - description: 页码（默认1）
        in: query
        name: page
        type: integer
      - description: 每页数量（默认20）
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 获取 API 密钥列表
      tags:
      - auth-API密钥
    post:
      consumes:
      - application/json
      description: 为当前用户创建一个新的 API 访问密钥
      parameters:
      - description: 密钥信息
        in: body
        name: body
        required: true
        schema:
          properties:
            expires_in:
              type: string
            name:
              type: string
            scopes:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 创建 API 密钥
      tags:
      - auth-API密钥
  /auth/api-keys/{id}:
    delete:
      description: 删除指定 ID 的 API 密钥
      parameters:
      - description: 密钥 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_Allinost_go-backend-core_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 删除 API 密钥
      tags:
      - auth-API密钥
    put:
      consumes:
      - application/json
      description: 更新指定 API 密钥的名称、权限范围或状态
      parameters:
      - description: 密钥 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新内容
        in: body
        name: body
        required: true
        schema:
          properties:
            name:
              type: string
            scopes:
              type: string
            status:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
